apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: gpu-metrics
  namespace: ai-platform
  labels:
    release: prometheus
    app: nvidia-dcgm-exporter
spec:
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter
  namespaceSelector:
    any: true
  podMetricsEndpoints:
    - port: gpu-metrics
      path: /metrics
      interval: 15s
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_pod_node_name
          targetLabel: node
          action: replace
        - sourceLabels:
            - __meta_kubernetes_pod_name
          targetLabel: pod
          action: replace
        - sourceLabels:
            - __meta_kubernetes_pod_label_app
          targetLabel: app
          action: replace
      metricRelabelings:
        - sourceLabels:
            - __name__
          regex: "DCGM_FI_DEV_GPU_UTIL|DCGM_FI_DEV_MEM_COPY_UTIL|DCGM_FI_DEV_ENC_UTIL|DCGM_FI_DEV_DEC_UTIL|DCGM_FI_DEV_XBAR_UTIL|DCGM_FI_DEV_FB_FREE|DCGM_FI_DEV_FB_USED|DCGM_FI_DEV_POWER_USAGE|DCGM_FI_DEV_TEMP|DCGM_FI_DEV_SM_CLOCK|DCGM_FI_DEV_MEM_CLOCK|DCGM_FI_PROF_GR_ENGINE_ACTIVE|DCGM_FI_DEV_PCIE_RX_THROUGHPUT|DCGM_FI_DEV_PCIE_TX_THROUGHPUT"
          action: keep
