apiVersion: serving.kserve.io/v1alpha1
kind: ClusterServingRuntime
metadata:
  name: vllm-runtime
spec:
  supportedModelFormats:
    - name: vllm
      version: "1"
      autoSelect: true
  protocolVersions:
    - v2
  containers:
    - name: kserve-container
      image: vllm/vllm-openai:v0.5.0
      command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
      args:
        - --model
        - /mnt/models
        - --port
        - "8000"
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.95"
        - --dtype
        - auto
      env:
        - name: MODEL_NAME
          value: "model"
        - name: MAX_NUM_BATCHED_TOKENS
          value: "8192"
      ports:
        - name: http
          containerPort: 8000
          protocol: TCP
  nodeSelector:
    nvidia.com/gpu: "true"
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
