global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ai-platform-proxy"
    static_configs:
      - targets: ["proxy:8000"]
    metrics_path: /metrics

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cadvisor"
    scrape_interval: 10s
    static_configs:
      - targets: ["cadvisor:8080"]
    metrics_path: /metrics
