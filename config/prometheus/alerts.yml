groups:
  - name: ai-platform
    rules:
      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(llm_request_duration_seconds_bucket[5m])) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM request p95 latency > 5s"
          description: "p95 latency is {{ $value }}s"

      - alert: CriticalRequestLatency
        expr: histogram_quantile(0.99, rate(llm_request_duration_seconds_bucket[1m])) > 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "LLM request p99 latency > 10s"

      - alert: HighErrorRate
        expr: rate(llm_requests_total{status="error"}[5m]) / rate(llm_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM error rate > 5%"

      - alert: LowThroughput
        expr: rate(llm_tokens_per_second_sum[5m]) / rate(llm_tokens_per_second_count[5m]) < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Average tokens/sec < 10"

      - alert: NoActiveRequests
        expr: llm_active_requests == 0
        for: 10m
        labels:
          severity: info
        annotations:
          summary: "No active LLM requests for 10min"

      - alert: GPUInstanceDown
        expr: up{job="ai-platform-proxy"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "AI Proxy instance is down"
